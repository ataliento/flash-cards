<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjetas de estudio - Coloquio de Matemática</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #15120F;
    --surface: #1E1A16;
    --surface2: #2A2420;
    --ink: #F0EDE6;
    --ink2: #9A9088;
    --ink3: #6A6058;
    --accent: #D4622A;
    --border: #2E2922;
    --card-f-bg: #1E1A16;
    --card-f-text: #F0EDE6;
    --card-b-bg: #2f333a;
    --card-b-text: #F4F0E8;
    --card-b-muted: #D7B98A;
    --correct-bg: rgba(45,106,79,0.18);
    --correct-border: #2D6A4F;
    --correct-text: #74C69D;
    --wrong-bg: rgba(123,45,45,0.18);
    --wrong-border: #7B2D2D;
    --wrong-text: #E07A7A;
    --hint-bg: rgba(212,98,42,0.12);
  }

  body {
    font-family: "DM Sans", "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 3rem;
  }

  button { font: inherit; }
  .container { width: 100%; max-width: 700px; }

  header { text-align: center; margin-bottom: 1.35rem; }
  .header-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .5rem;
  }
  header h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(1.55rem, 8vw, 2.25rem);
    font-weight: 300;
    line-height: 1.15;
    color: var(--ink);
    letter-spacing: 0;
  }
  header h1 em { font-style: italic; }
  .header-sub {
    font-size: 13px;
    color: var(--ink3);
    margin-top: .6rem;
    line-height: 1.45;
  }

  .stats-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .stat-pill.correct { background: var(--correct-bg); color: var(--correct-text); border-color: var(--correct-border); }
  .stat-pill.wrong { background: var(--wrong-bg); color: var(--wrong-text); border-color: var(--wrong-border); }
  .stat-pill.pending, .stat-pill.total { background: var(--surface); color: var(--ink3); border-color: var(--border); }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  .panel-block { margin-bottom: 1rem; }
  .panel-title {
    text-align: center;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: .55rem;
  }
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 0 0 .35rem;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink2);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab:hover { border-color: var(--ink3); color: var(--ink); }
  .tab.active { background: var(--ink); border-color: var(--ink); color: var(--bg); }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: .75rem 0 1rem;
  }
  .hint-top-btn {
    flex: 0 0 auto;
    background: rgba(212,98,42,.12);
    border-color: rgba(212,98,42,.34);
    color: #E4C07A;
    font-weight: 700;
  }
  .progress-track { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width .4s ease; }
  .progress-label { font-size: 12px; color: var(--ink3); min-width: 44px; text-align: right; }

  .card-scene {
    perspective: 1400px;
    margin-bottom: .9rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .card-wrap {
    width: 100%;
    height: min(58vh, 430px);
    min-height: 320px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .58s cubic-bezier(.4,0,.2,1), filter .28s ease, box-shadow .28s ease;
  }
  .card-wrap.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 18px;
    padding: 1.35rem 1.45rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,.22);
  }
  .face-front {
    background: var(--card-f-bg);
    border: 1px solid var(--border);
    color: var(--card-f-text);
  }
  .face-back {
    background: linear-gradient(155deg, #343941, var(--card-b-bg));
    color: var(--card-b-text);
    border: 1px solid #464d57;
    transform: rotateY(180deg);
  }
  .card-face-label {
    position: absolute;
    top: 1.15rem;
    left: 1.35rem;
    max-width: calc(100% - 5.5rem);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .face-back .card-face-label { color: var(--card-b-muted); }
  .card-menu {
    position: absolute;
    top: 1rem;
    right: 1.2rem;
    color: currentColor;
    opacity: .72;
    font-size: 22px;
    line-height: 1;
  }
  .card-mark-indicator {
    position: absolute;
    top: 2.75rem;
    left: 1.3rem;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    padding: 3px 10px;
    border-radius: 100px;
    opacity: 0;
    transition: opacity .2s;
  }
  .card-mark-indicator.show { opacity: 1; }
  .card-mark-indicator.correcta { background: var(--correct-bg); color: var(--correct-text); }
  .card-mark-indicator.incorrecta { background: var(--wrong-bg); color: var(--wrong-text); }

  .card-q {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(1.35rem, 7vw, 2rem);
    font-weight: 300;
    line-height: 1.45;
    color: var(--card-f-text);
    overflow-wrap: anywhere;
  }
  .options {
    list-style: none;
    display: grid;
    gap: 8px;
    margin-top: 1.1rem;
  }
  .options li {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 9px 11px;
    color: var(--ink2);
    background: rgba(255,255,255,.025);
    font-size: 13px;
    line-height: 1.4;
  }
  .card-a {
    font-size: 13px;
    line-height: 1.72;
    color: var(--card-b-text);
    overflow-y: auto;
    max-height: calc(100% - 1.5rem);
    padding-right: 4px;
  }
  .card-a::-webkit-scrollbar { width: 3px; }
  .card-a::-webkit-scrollbar-track { background: transparent; }
  .card-a::-webkit-scrollbar-thumb { background: rgba(128,128,128,.35); border-radius: 2px; }
  .answer-title {
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #E4C07A;
    margin: 1.1rem 0 .35rem;
    font-weight: 800;
  }
  .answer-main {
    font-size: clamp(1.05rem, 4.8vw, 1.35rem);
    line-height: 1.45;
    font-weight: 800;
    color: #FFFFFF;
    margin-bottom: .95rem;
  }
  .answer-explanation {
    font-size: 13px;
    line-height: 1.72;
    color: #E6E1D8;
  }
  .hint-box {
    position: absolute;
    left: 1.25rem;
    right: 1.25rem;
    bottom: 3rem;
    border: 1px solid rgba(212,98,42,.32);
    background: var(--hint-bg);
    color: var(--ink2);
    border-radius: 12px;
    padding: .7rem .8rem;
    font-size: 12px;
    line-height: 1.45;
    animation: riseIn .2s ease;
  }
  .flip-hint {
    position: absolute;
    bottom: 1.15rem;
    right: 1.35rem;
    font-size: 11px;
    color: var(--ink3);
  }
  .face-back .flip-hint { color: #B9C4D0; }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes enterFromRight {
    from { opacity: 0; transform: translateX(26px) scale(.985); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes enterFromLeft {
    from { opacity: 0; transform: translateX(-26px) scale(.985); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }
  .card-scene.enter-right { animation: enterFromRight .34s ease both; }
  .card-scene.enter-left { animation: enterFromLeft .34s ease both; }
  .card-wrap.marking-correcta .card-face {
    background: linear-gradient(155deg, rgba(45,106,79,.82), rgba(29,70,53,.94));
    border-color: var(--correct-border);
    box-shadow: 0 0 0 1px rgba(116,198,157,.35), 0 24px 70px rgba(45,106,79,.28);
  }
  .card-wrap.marking-incorrecta .card-face {
    background: linear-gradient(155deg, rgba(123,45,45,.84), rgba(72,31,33,.96));
    border-color: var(--wrong-border);
    box-shadow: 0 0 0 1px rgba(224,122,122,.35), 0 24px 70px rgba(123,45,45,.28);
  }

  .mark-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 1rem;
    min-height: 44px;
    align-items: center;
  }
  .mark-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    opacity: 0;
    pointer-events: none;
    transform: translateY(6px);
    transition: opacity .25s, transform .25s, filter .18s;
  }
  .mark-btn.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .mark-btn.correct-btn { background: var(--correct-bg); color: var(--correct-text); border-color: var(--correct-border); }
  .mark-btn.wrong-btn { background: var(--wrong-bg); color: var(--wrong-text); border-color: var(--wrong-border); }
  .mark-btn:hover { filter: brightness(1.16); }

  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
    margin-bottom: .9rem;
  }
  .nav-btn, .action-btn {
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    transition: all .18s;
    white-space: nowrap;
  }
  .nav-btn { padding: 10px 14px; font-size: 13px; }
  .nav-btn:hover:not(:disabled), .action-btn:hover { background: var(--surface2); border-color: var(--ink3); }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .prev-btn { justify-self: start; }
  .next-btn { justify-self: end; }
  .nav-center { text-align: center; min-width: 70px; }
  .nav-count {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.08rem;
    font-weight: 300;
    color: var(--ink);
    display: block;
  }
  .nav-unit-label {
    display: block;
    max-width: 110px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
    color: var(--ink3);
  }
  .actions {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .action-btn {
    padding: 8px 14px;
    color: var(--ink2);
    background: transparent;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .empty {
    min-height: 260px;
    display: grid;
    place-items: center;
    text-align: center;
    color: var(--ink3);
    border: 1px solid var(--border);
    border-radius: 18px;
    background: var(--surface);
    padding: 2rem;
    line-height: 1.5;
  }
  .kb-hint {
    text-align: center;
    font-size: 12px;
    color: var(--ink3);
    margin-top: 1.4rem;
    line-height: 2.2;
  }
  kbd {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px;
    color: var(--ink2);
  }

  @media (max-width: 420px) {
    body { padding: 1.1rem .75rem 2.5rem; }
    .progress-row { flex-wrap: wrap; }
    .progress-row .progress-track { flex-basis: calc(100% - 54px); }
    .hint-top-btn { flex: 1 1 calc(50% - 6px); justify-content: center; }
    .card-wrap { height: 54vh; min-height: 300px; }
    .card-face { padding: 1.2rem; border-radius: 16px; }
    .card-face-label { left: 1.15rem; top: 1rem; max-width: calc(100% - 4.7rem); }
    .card-menu { top: .82rem; right: 1rem; }
    .card-q { font-size: clamp(1.22rem, 7.5vw, 1.65rem); }
    .card-a { font-size: 12.5px; line-height: 1.65; }
    .hint-box { left: 1rem; right: 1rem; bottom: 2.7rem; }
    .flip-hint { right: 1rem; }
    .mark-row { gap: 8px; }
    .mark-btn { flex: 1; justify-content: center; padding: 10px 10px; }
    .nav-btn { padding: 9px 12px; }
    .action-btn { flex: 1 1 auto; justify-content: center; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-label">Tarjetas de Estudio</div>
    <h1>Coloquio de <em>Matemática</em></h1>
    <p class="header-sub">Preguntas del archivo PREGUNTAS.md para practicar con tarjetas</p>
  </header>

  <div class="stats-bar">
    <div class="stat-pill total">Total: <strong id="stat-total">0</strong></div>
    <div class="stat-pill correct"><div class="stat-dot"></div> Correctas: <strong id="stat-correct">0</strong></div>
    <div class="stat-pill wrong"><div class="stat-dot"></div> Incorrectas: <strong id="stat-wrong">0</strong></div>
    <div class="stat-pill pending">Sin marcar: <strong id="stat-pending">0</strong></div>
    <div class="stat-pill total">Aciertos: <strong id="stat-rate">0%</strong></div>
  </div>

  <div class="panel-block">
    <div class="panel-title">Temas</div>
    <div class="tabs" id="topic-tabs"></div>
  </div>

  <div class="panel-block">
    <div class="panel-title">Estado</div>
    <div class="tabs" id="status-tabs">
      <button class="tab active" data-status="todas">Todas</button>
      <button class="tab" data-status="sin responder">Sin responder</button>
      <button class="tab" data-status="correcta">Correctas</button>
      <button class="tab" data-status="incorrecta">Incorrectas</button>
    </div>
  </div>

  <div class="progress-row">
    <button class="action-btn hint-top-btn" id="btn-hint" type="button">Ver pista</button>
    <button class="action-btn hint-top-btn" id="btn-flip" type="button">Ver respuesta</button>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">0%</div>
  </div>

  <div id="study-area"></div>

  <div class="mark-row">
    <button class="mark-btn wrong-btn" id="btn-wrong" type="button">
      <span>✕</span> No la sabía
    </button>
    <button class="mark-btn correct-btn" id="btn-correct" type="button">
      <span>✓</span> La sabía
    </button>
  </div>

  <div class="nav">
    <button class="nav-btn prev-btn" id="btn-prev" type="button">← Anterior</button>
    <div class="nav-center">
      <span class="nav-count" id="nav-count">0 / 0</span>
      <span class="nav-unit-label" id="nav-topic">Sin tema</span>
    </div>
    <button class="nav-btn next-btn" id="btn-next" type="button">Siguiente →</button>
  </div>

  <div class="actions">
    <button class="action-btn" id="btn-shuffle" type="button">Mezclar</button>
    <button class="action-btn" id="btn-reset" type="button">Reiniciar</button>
  </div>

  <div class="kb-hint">
    <kbd>←</kbd> <kbd>→</kbd> navegar &nbsp;·&nbsp; <kbd>Espacio</kbd> voltear &nbsp;·&nbsp; <kbd>C</kbd> correcta &nbsp;·&nbsp; <kbd>X</kbd> incorrecta
  </div>
</div>

const STORAGE_KEY = 'coloquio_matematica_flashcards_estado_v1';
const OFFICIAL_TOPICS = ["Introducción General","1 - Algebra de Boole","2- Sistema binario","3- Lógica","4 - Conjuntos","5 - Matrices","6 - Arboles y Grafos"];
let selectedTopics = new Set(OFFICIAL_TOPICS);
let statusFilter = 'todas';
let deck = [];
let idx = 0;
let isFlipped = false;
let hintVisible = false;
let slideDirection = 'enter-right';
let isMarking = false;

const els = {
  topicTabs: document.getElementById('topic-tabs'),
  statusTabs: document.getElementById('status-tabs'),
  studyArea: document.getElementById('study-area'),
  correct: document.getElementById('stat-correct'),
  wrong: document.getElementById('stat-wrong'),
  pending: document.getElementById('stat-pending'),
  total: document.getElementById('stat-total'),
  rate: document.getElementById('stat-rate'),
  progressFill: document.getElementById('progress-fill'),
  progressLabel: document.getElementById('progress-label'),
  navCount: document.getElementById('nav-count'),
  navTopic: document.getElementById('nav-topic'),
  prev: document.getElementById('btn-prev'),
  next: document.getElementById('btn-next'),
  hint: document.getElementById('btn-hint'),
  flip: document.getElementById('btn-flip'),
  shuffle: document.getElementById('btn-shuffle'),
  reset: document.getElementById('btn-reset'),
  markCorrect: document.getElementById('btn-correct'),
  markWrong: document.getElementById('btn-wrong')
};

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;')
    .replace(/\n/g, '<br>');
}

function loadProgress() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    tarjetas.forEach(card => {
      if (saved[card.id] === 'correcta' || saved[card.id] === 'incorrecta') card.estado = saved[card.id];
    });
  } catch (error) {
    console.warn('No se pudo leer el progreso guardado.', error);
  }
}

function saveProgress() {
  const saved = {};
  tarjetas.forEach(card => {
    if (card.estado !== 'sin responder') saved[card.id] = card.estado;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
}

function topics() {
  return ['Todos', ...OFFICIAL_TOPICS];
}

function buildTopicTabs() {
  els.topicTabs.innerHTML = '';
  const allTopics = topics().slice(1);
  const allSelected = allTopics.every(topic => selectedTopics.has(topic));
  topics().forEach(topic => {
    const count = topic === 'Todos' ? tarjetas.length : tarjetas.filter(card => card.tema === topic).length;
    const btn = document.createElement('button');
    const active = topic === 'Todos' ? allSelected : selectedTopics.has(topic);
    btn.className = 'tab' + (active ? ' active' : '');
    btn.textContent = topic + ' · ' + count;
    btn.dataset.topic = topic;
    btn.addEventListener('click', () => {
      if (topic === 'Todos') {
        selectedTopics = new Set(allTopics);
      } else if (selectedTopics.has(topic)) {
        selectedTopics.delete(topic);
      } else {
        selectedTopics.add(topic);
      }
      idx = 0;
      applyFilters();
    });
    els.topicTabs.appendChild(btn);
  });
}

function filteredCards() {
  return tarjetas.filter(card => {
    const topicOk = selectedTopics.has(card.tema);
    const statusOk = statusFilter === 'todas' || card.estado === statusFilter;
    return topicOk && statusOk;
  });
}

function applyFilters() {
  deck = filteredCards().map(card => card.id);
  if (idx >= deck.length) idx = Math.max(deck.length - 1, 0);
  isFlipped = false;
  hintVisible = false;
  render();
}

function currentCard() {
  const id = deck[idx];
  return tarjetas.find(card => card.id === id);
}

function updateStats() {
  const filtered = deck.map(id => tarjetas.find(card => card.id === id)).filter(Boolean);
  const correct = filtered.filter(card => card.estado === 'correcta').length;
  const wrong = filtered.filter(card => card.estado === 'incorrecta').length;
  const pending = filtered.filter(card => card.estado === 'sin responder').length;
  const answered = correct + wrong;
  els.total.textContent = filtered.length;
  els.correct.textContent = correct;
  els.wrong.textContent = wrong;
  els.pending.textContent = pending;
  els.rate.textContent = answered ? Math.round(correct / answered * 100) + '%' : '0%';
}

function markLabel(card) {
  if (!card || card.estado === 'sin responder') return '';
  return card.estado === 'correcta' ? '✓ La sabía' : '✕ No la sabía';
}

function render() {
  buildTopicTabs();
  updateStats();
  document.querySelectorAll('#status-tabs .tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.status === statusFilter);
  });

  const card = currentCard();
  const total = deck.length;
  const pos = total ? idx + 1 : 0;
  const pct = total ? pos / total * 100 : 0;
  els.progressFill.style.width = pct.toFixed(1) + '%';
  els.progressLabel.textContent = Math.round(pct) + '%';
  els.navCount.textContent = pos + ' / ' + total;
  els.navTopic.textContent = card ? card.tema : 'Sin tema';
  els.prev.disabled = idx === 0 || total === 0;
  els.next.disabled = idx >= total - 1 || total === 0;
  els.hint.disabled = !card || hintVisible || isFlipped;
  els.flip.disabled = !card;
  els.flip.textContent = isFlipped ? 'Ver pregunta' : 'Ver respuesta';
  els.shuffle.disabled = total < 2;
  setMarkBtns(isFlipped && !!card);

  if (!card) {
    els.studyArea.innerHTML = '<div class="empty"><div><strong>No hay tarjetas para estos filtros.</strong><br>Probá cambiar el tema o el estado seleccionado.</div></div>';
    return;
  }

  const optionsHtml = card.opciones && card.opciones.length
    ? '<ul class="options">' + card.opciones.map(opt => '<li>' + escapeHtml(opt) + '</li>').join('') + '</ul>'
    : '';
  const hintHtml = hintVisible ? '<div class="hint-box"><strong>Pista:</strong> ' + escapeHtml(card.pista) + '</div>' : '';
  const indicator = card.estado !== 'sin responder'
    ? '<div class="card-mark-indicator show ' + card.estado + '">' + markLabel(card) + '</div>'
    : '<div class="card-mark-indicator"></div>';
  const backIndicator = card.estado !== 'sin responder'
    ? '<div class="card-mark-indicator show ' + card.estado + '">' + markLabel(card) + '</div>'
    : '<div class="card-mark-indicator"></div>';

  els.studyArea.innerHTML =
    '<div class="card-scene ' + slideDirection + '" id="card-scene">' +
      '<div class="card-wrap ' + (isFlipped ? 'flipped' : '') + '" id="card-wrap">' +
        '<div class="card-face face-front">' +
          indicator +
          '<div class="card-face-label">' + escapeHtml(card.tema) + '</div>' +
          '<div class="card-menu">⋮</div>' +
          '<div class="card-q">' + escapeHtml(card.pregunta) + '</div>' +
          optionsHtml +
          hintHtml +
          '<div class="flip-hint">clic para voltear</div>' +
        '</div>' +
        '<div class="card-face face-back">' +
          backIndicator +
          '<div class="card-face-label">Respuesta</div>' +
          '<div class="card-menu">⋮</div>' +
          '<div class="card-a">' +
            '<div class="answer-title">Respuesta correcta</div>' +
            '<div class="answer-main">' + escapeHtml(card.respuesta) + '</div>' +
            '<div class="answer-title">Explicación</div>' +
            '<div class="answer-explanation">' + escapeHtml(card.explicacion) + '</div>' +
          '</div>' +
          '<div class="flip-hint">clic para volver</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('card-scene').addEventListener('click', flip);
}

function setMarkBtns(show) {
  els.markCorrect.classList.toggle('visible', show);
  els.markWrong.classList.toggle('visible', show);
}

function syncFlipDom() {
  const wrap = document.getElementById('card-wrap');
  if (wrap) wrap.classList.toggle('flipped', isFlipped);
  setMarkBtns(isFlipped && !!currentCard());
  els.hint.disabled = !currentCard() || hintVisible || isFlipped;
  els.flip.disabled = !currentCard();
  els.flip.textContent = isFlipped ? 'Ver pregunta' : 'Ver respuesta';
}

function flip() {
  if (!currentCard() || isMarking) return;
  isFlipped = !isFlipped;
  if (isFlipped && hintVisible) {
    hintVisible = false;
    const hint = document.querySelector('.hint-box');
    if (hint) hint.remove();
  }
  syncFlipDom();
}

function move(delta) {
  if (isMarking) return;
  const next = idx + delta;
  if (next < 0 || next >= deck.length) return;
  slideDirection = delta > 0 ? 'enter-right' : 'enter-left';
  idx = next;
  isFlipped = false;
  hintVisible = false;
  render();
}

function mark(status) {
  const card = currentCard();
  if (!card || !isFlipped || isMarking) return;
  isMarking = true;
  const oldIndex = idx;
  const shouldAdvanceAfterFilter = statusFilter === 'todas' || statusFilter === status;
  card.estado = status;
  saveProgress();
  updateStats();
  const wrap = document.getElementById('card-wrap');
  if (wrap) wrap.classList.add('marking-' + status);
  setTimeout(() => {
    isMarking = false;
    slideDirection = 'enter-right';
    const nextIndex = shouldAdvanceAfterFilter ? oldIndex + 1 : oldIndex;
    applyFilters();
    idx = Math.min(nextIndex, Math.max(deck.length - 1, 0));
    isFlipped = false;
    hintVisible = false;
    render();
  }, 520);
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  slideDirection = 'enter-right';
  isFlipped = false;
  hintVisible = false;
  render();
}

function resetProgress() {
  if (!confirm('¿Seguro que querés reiniciar todo el progreso?')) return;
  tarjetas.forEach(card => { card.estado = 'sin responder'; });
  localStorage.removeItem(STORAGE_KEY);
  idx = 0;
  isFlipped = false;
  hintVisible = false;
  applyFilters();
}

els.statusTabs.addEventListener('click', event => {
  const btn = event.target.closest('.tab');
  if (!btn) return;
  statusFilter = btn.dataset.status;
  idx = 0;
  applyFilters();
});
els.prev.addEventListener('click', () => move(-1));
els.next.addEventListener('click', () => move(1));
els.hint.addEventListener('click', () => { hintVisible = true; render(); });
els.flip.addEventListener('click', flip);
els.shuffle.addEventListener('click', shuffleDeck);
els.reset.addEventListener('click', resetProgress);
els.markCorrect.addEventListener('click', () => mark('correcta'));
els.markWrong.addEventListener('click', () => mark('incorrecta'));

document.addEventListener('keydown', event => {
  if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (event.key === 'ArrowRight') move(1);
  else if (event.key === 'ArrowLeft') move(-1);
  else if (event.key === ' ') { event.preventDefault(); flip(); }
  else if ((event.key === 'c' || event.key === 'C') && isFlipped) mark('correcta');
  else if ((event.key === 'x' || event.key === 'X') && isFlipped) mark('incorrecta');
});

loadProgress();
applyFilters();
</script>
</body>
